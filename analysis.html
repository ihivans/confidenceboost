<!DOCTYPE html>
<html>
<head>
<title>Your Confidence Analysis</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

</head>

<body class="survey-bg">

<header class="top-header">
<h1>CONFIDHER</h1>
<p>Your Confidence Growth Report</p>
</header>

<section class="container">

<div class="card result-box">

<h2>Your Current Confidence</h2>

<div class="confidence-bar">
<div id="confidenceFill"></div>
</div>

<p id="confidenceText"></p>

</div>

<div class="card">

<h3>Your Selected Answers</h3>
<div id="answers"></div>

</div>

<div class="card improvement">

<h3>Where You Can Improve</h3>
<p id="improveText"></p>

</div>

<div class="card">

<h3>Recommended Tasks</h3>
<ul id="tasks" class="tasks"></ul>

</div>

<button class="main-btn">Start My Growth Journey</button>

</section>

<script src="script.js"></script>

</body>
</html>
